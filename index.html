<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테트리스 - 바이브 코딩 실습</title>
  <style>
    /* ===== 기본 레이아웃 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Consolas', monospace;
      color: #e2e8f0;
    }

    .game-container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    /* ===== 게임 캔버스 ===== */
    #gameCanvas {
      border: 2px solid #334155;
      background: #0f172a;
      display: block;
    }

    /* ===== 사이드 패널 ===== */
    .side-panel {
      width: 150px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
    }

    .panel-box h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .panel-box .value {
      font-size: 28px;
      font-weight: bold;
      color: #e2e8f0;
    }

    /* 게임 오버 오버레이 */
    #overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      font-size: 24px;
      color: #f1f5f9;
    }

    #overlay.show { display: flex; }

    #restartBtn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 28px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Consolas', monospace;
    }
    #restartBtn:hover { background: #2563eb; }

    .canvas-wrapper {
      position: relative;
    }

    /* 조작 안내 */
    .controls {
      font-size: 12px;
      color: #475569;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="game-container">

  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="300" height="600"></canvas>
    <div id="overlay">
      <div>GAME OVER</div>
      <button id="restartBtn">다시 시작</button>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-box">
      <h3>점수</h3>
      <div class="value" id="scoreDisplay">0</div>
    </div>
    <div class="panel-box">
      <h3>레벨</h3>
      <div class="value" id="levelDisplay">1</div>
    </div>
    <div class="panel-box">
      <h3>라인</h3>
      <div class="value" id="linesDisplay">0</div>
    </div>
    <div class="panel-box controls">
      <h3>조작법</h3>
      ← → 이동<br>
      ↑ 회전<br>
      ↓ 빠르게<br>
    </div>
  </div>

</div>

<script>
// ============================================================
//  ■ 상수 정의 (Constants) — 이미 완성되어 있습니다
// ============================================================
const COLS        = 10;       // 보드 가로 칸 수
const ROWS        = 20;       // 보드 세로 칸 수
const BLOCK_SIZE  = 30;       // 한 칸의 픽셀 크기

// 테트리스 블록 7종 모양 (1 = 블록 있음)
const SHAPES = {
  I: [[1, 1, 1, 1]],
  O: [[1, 1],
      [1, 1]],
  T: [[0, 1, 0],
      [1, 1, 1]],
  S: [[0, 1, 1],
      [1, 1, 0]],
  Z: [[1, 1, 0],
      [0, 1, 1]],
  L: [[1, 0],
      [1, 0],
      [1, 1]],
  J: [[0, 1],
      [0, 1],
      [1, 1]],
};

// 블록별 색상
const COLORS = {
  I: '#00f0f0',
  O: '#f0f000',
  T: '#a000f0',
  S: '#00f000',
  Z: '#f00000',
  L: '#f0a000',
  J: '#0000f0',
};

// 블록 종류 목록
const PIECE_TYPES = Object.keys(SHAPES);  // ['I','O','T','S','Z','L','J']

// ============================================================
//  ■ 캔버스 초기화 — 이미 완성되어 있습니다
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// ============================================================
//  ■ 게임 상태 변수
// ============================================================
let board        = [];          // 2D 배열: null = 빈칸, 색상 문자열 = 블록
let currentPiece = null;        // 현재 떨어지는 블록 { shape, color, x, y }
let score        = 0;
let level        = 1;
let linesCleared = 0;
let gameOver     = false;
let lastTime     = 0;
let dropInterval = 1000;        // ms — 자동 하강 간격 (레벨에 따라 줄어듦)

// ============================================================
//  ■ 단일 블록 그리기 헬퍼 — 이미 완성되어 있습니다
//    x, y: 보드 기준 칸 좌표
//    color: 채울 색상 문자열
// ============================================================
function drawBlock(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(
    x * BLOCK_SIZE,
    y * BLOCK_SIZE,
    BLOCK_SIZE - 1,
    BLOCK_SIZE - 1
  );
  // 하이라이트 (윗면 밝게)
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, 4);
}

// ============================================================
//  TODO 1: initBoard()
// ============================================================
function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board.push(new Array(COLS).fill(null));
  }
}

// ============================================================
//  TODO 2: createPiece()
// ============================================================
function createPiece() {
  const type = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
  const shape = SHAPES[type];
  const color = COLORS[type];
  
  // 가로 크기를 고려하여 중앙 x 좌표 계산
  const x = Math.floor((COLS - shape[0].length) / 2);
  
  currentPiece = {
    shape: shape,
    color: color,
    x: x,
    y: 0
  };
}

// ============================================================
//  TODO 3: isCollision(piece, dx, dy)
// ============================================================
function isCollision(piece, dx, dy) {
  for (let r = 0; r < piece.shape.length; r++) {
    for (let c = 0; c < piece.shape[r].length; c++) {
      if (piece.shape[r][c] === 1) {
        const nextX = piece.x + c + dx;
        const nextY = piece.y + r + dy;

        // 왼쪽·오른쪽 벽 및 바닥 경계 체크
        if (nextX < 0 || nextX >= COLS || nextY >= ROWS) {
          return true;
        }

        // 천장(nextY < 0)은 패스하되, 보드 범위 내에 존재할 때 다른 블록과의 충돌 체크
        if (nextY >= 0 && board[nextY][nextX] !== null) {
          return true;
        }
      }
    }
  }
  return false;
}

// ============================================================
//  TODO 4: rotate(shape)
// ============================================================
function rotate(shape) {
  const rows = shape.length;
  const cols = shape[0].length;
  
  // cols × rows 크기의 새 2D 배열 생성
  let rotated = [];
  for (let c = 0; c < cols; c++) {
    rotated.push(new Array(rows).fill(0));
  }

  // 90도 시계 방향 회전 매핑
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      rotated[c][rows - 1 - r] = shape[r][c];
    }
  }
  return rotated;
}

// ============================================================
//  TODO 5: placePiece()
// ============================================================
function placePiece() {
  for (let r = 0; r < currentPiece.shape.length; r++) {
    for (let c = 0; c < currentPiece.shape[r].length; c++) {
      if (currentPiece.shape[r][c] === 1) {
        const targetY = currentPiece.y + r;
        const targetX = currentPiece.x + c;
        
        // 보드 화면 안(y >= 0)에 있는 경우에만 고정
        if (targetY >= 0) {
          board[targetY][targetX] = currentPiece.color;
        }
      }
    }
  }
}

// ============================================================
//  TODO 6: clearLines()
// ============================================================
function clearLines() {
  let count = 0;

  for (let r = 0; r < ROWS; r++) {
    // 모든 칸이 null이 아닌지(가득 찼는지) 확인
    if (board[r].every(cell => cell !== null)) {
      board.splice(r, 1); // 해당 행 제거
      board.unshift(new Array(COLS).fill(null)); // 맨 위에 빈 행 추가
      count++;
    }
  }

  if (count > 0) {
    const points = [0, 100, 300, 500, 800];
    score += (points[count] || 800) * level;
    linesCleared += count;
    
    // 레벨 및 하강 주기 업데이트
    level = Math.floor(linesCleared / 10) + 1;
    dropInterval = Math.max(100, 1000 - (level - 1) * 100);
    
    updateUI();
  }
}

// ============================================================
//  TODO 7: draw()
// ============================================================
function draw() {
  // ① 배경 지우기 — 완성
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 격자 선 (옅게)
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 0.5;
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * BLOCK_SIZE, 0);
    ctx.lineTo(c * BLOCK_SIZE, canvas.height);
    ctx.stroke();
  }
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * BLOCK_SIZE);
    ctx.lineTo(canvas.width, r * BLOCK_SIZE);
    ctx.stroke();
  }

  // ② board 고정 블록 그리기
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] !== null) {
        drawBlock(c, r, board[r][c]);
      }
    }
  }

  // ③ currentPiece 그리기
  if (currentPiece) {
    for (let r = 0; r < currentPiece.shape.length; r++) {
      for (let c = 0; c < currentPiece.shape[r].length; c++) {
        if (currentPiece.shape[r][c] === 1) {
          drawBlock(currentPiece.x + c, currentPiece.y + r, currentPiece.color);
        }
      }
    }
  }
}

// ============================================================
//  TODO 8: 키보드 입력 처리
// ============================================================
document.addEventListener('keydown', (e) => {
  if (gameOver) return;
  if (!currentPiece) return;

  switch (e.key) {
    case 'ArrowLeft':
      if (!isCollision(currentPiece, -1, 0)) {
        currentPiece.x -= 1;
      }
      break;

    case 'ArrowRight':
      if (!isCollision(currentPiece, 1, 0)) {
        currentPiece.x += 1;
      }
      break;

    case 'ArrowDown':
      if (!isCollision(currentPiece, 0, 1)) {
        currentPiece.y += 1;
      } else {
        placePiece();
        clearLines();
        createPiece();
        // 새 블록 생성 직후 충돌이면 게임오버
        if (isCollision(currentPiece, 0, 0)) {
          gameOver = true;
          showGameOver();
        }
      }
      break;

    case 'ArrowUp':
      const rotatedShape = rotate(currentPiece.shape);
      const testPiece = { ...currentPiece, shape: rotatedShape };
      if (!isCollision(testPiece, 0, 0)) {
        currentPiece.shape = rotatedShape;
      }
      break;
  }

  draw();  // 이동 후 바로 화면 갱신
});

// ============================================================
//  TODO 9: gameLoop(timestamp)
// ============================================================
function gameLoop(timestamp) {
  if (gameOver) return;

  if (!lastTime) lastTime = timestamp;
  const deltaTime = timestamp - lastTime;

  if (deltaTime > dropInterval) {
    if (!isCollision(currentPiece, 0, 1)) {
      currentPiece.y += 1;
    } else {
      placePiece();
      clearLines();
      createPiece();
      
      // 새 블록 생성 직후 충돌하면 게임오버
      if (isCollision(currentPiece, 0, 0)) {
        gameOver = true;
        showGameOver();
      }
    }
    lastTime = timestamp;
  }

  draw();  // 일단 매 프레임 draw 는 실행되도록 유지
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  ■ UI 업데이트 헬퍼 — 이미 완성되어 있습니다
// ============================================================
function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('linesDisplay').textContent = linesCleared;
}

// ============================================================
//  ■ 게임 시작 / 재시작 — 이미 완성되어 있습니다
// ============================================================
function startGame() {
  initBoard();
  score        = 0;
  level        = 1;
  linesCleared = 0;
  gameOver     = false;
  dropInterval = 1000;
  lastTime     = 0;

  createPiece();
  updateUI();

  document.getElementById('overlay').classList.remove('show');
  requestAnimationFrame(gameLoop);
}

document.getElementById('restartBtn').addEventListener('click', startGame);

// 게임 오버 시 오버레이 표시는 gameLoop 안에서 처리
// 아래 함수를 호출해서 오버레이를 표시하세요:
function showGameOver() {
  document.getElementById('overlay').classList.add('show');
}

// 게임 시작!
startGame();
</script>
</body>
</html>
